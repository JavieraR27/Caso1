# Blueprint de Render — Marketplace Paris (EP3)
# Despliega los 11 microservicios de negocio como web services Docker (plan free).
# Eureka y Gateway quedan como infra local: en la nube cada servicio tiene su URL
# y el discovery se desactiva vía EUREKA_CLIENT_ENABLED=false.
#
# Uso: push del repo a GitHub → Render → New → Blueprint → seleccionar el repo.
# Al crear el blueprint, Render pide los 3 valores sync:false del grupo paris-comun
# (usuario y password de Neon + secreto JWT). autoDeploy está apagado para cuidar
# los minutos de build del plan free: desplegar manualmente desde el dashboard.
#
# OJO: si algún nombre paris-* está tomado, Render agrega un sufijo a la URL;
# en ese caso corregir las *_SERVICE_URL correspondientes en el dashboard.

envVarGroups:
  - name: paris-comun
    envVars:
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: PARIS_JWT_SECRET
        sync: false
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      # Cold start del free tier: timeouts holgados entre servicios
      - key: PARIS_WEBCLIENT_RESPONSETIMEOUT
        value: "75"
      - key: PARIS_WEBCLIENT_CONNECTTIMEOUTMS
        value: "10000"
      # 512 MB por instancia: acotar el heap de la JVM
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:MaxRAMPercentage=75"

services:
  - type: web
    name: paris-legacy
    runtime: docker
    plan: free
    autoDeploy: false
    dockerfilePath: ./legacy/Dockerfile
    dockerContext: ./legacy
    healthCheckPath: /v3/api-docs
    envVars:
      - fromGroup: paris-comun
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-red-river-atqxiz3l-pooler.c-9.us-east-1.aws.neon.tech/legacydb?sslmode=require&channel_binding=require

  - type: web
    name: paris-clientes
    runtime: docker
    plan: free
    autoDeploy: false
    dockerfilePath: ./clientes/Dockerfile
    dockerContext: ./clientes
    healthCheckPath: /v3/api-docs
    envVars:
      - fromGroup: paris-comun
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-red-river-atqxiz3l-pooler.c-9.us-east-1.aws.neon.tech/clientesdb?sslmode=require&channel_binding=require
      - key: LEGACY_SERVICE_URL
        value: https://paris-legacy.onrender.com

  - type: web
    name: paris-proveedores
    runtime: docker
    plan: free
    autoDeploy: false
