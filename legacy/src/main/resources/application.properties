spring.application.name=legacy
server.port=8081

# Perfil de secretos (patrón del profe; el archivo real está gitignored)
spring.profiles.include=secrets

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# ProblemDetail lo maneja nuestro GlobalExceptionHandler
spring.mvc.problemdetails.enabled=false

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Pool acotado (11 servicios contra un proyecto Neon)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# Eureka (service discovery) - el servicio arranca igual si Eureka esta caido
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
