# Desplegable de Swagger UI, en el orden en que aparecen en la historia de María
springdoc.swagger-ui.urls[0].name=clientes (login Mar\u00EDa)
springdoc.swagger-ui.urls[0].url=/api-docs/clientes
springdoc.swagger-ui.urls[1].name=legacy
springdoc.swagger-ui.urls[1].url=/api-docs/legacy
springdoc.swagger-ui.urls[2].name=productos (cat\u00E1logo)
springdoc.swagger-ui.urls[2].url=/api-docs/productos
springdoc.swagger-ui.urls[3].name=feedback (rese\u00F1as)
springdoc.swagger-ui.urls[3].url=/api-docs/feedback
springdoc.swagger-ui.urls[4].name=ventas (orquestador)
springdoc.swagger-ui.urls[4].url=/api-docs/ventas
springdoc.swagger-ui.urls[5].name=pagos
springdoc.swagger-ui.urls[5].url=/api-docs/pagos
springdoc.swagger-ui.urls[6].name=despacho
springdoc.swagger-ui.urls[6].url=/api-docs/despacho
springdoc.swagger-ui.urls[7].name=tickets (reclamos)
springdoc.swagger-ui.urls[7].url=/api-docs/tickets
springdoc.swagger-ui.urls[8].name=notificaciones
springdoc.swagger-ui.urls[8].url=/api-docs/notificaciones
springdoc.swagger-ui.urls[9].name=proveedores
