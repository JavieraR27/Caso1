springdoc.swagger-ui.urls[10].name=administrador
springdoc.swagger-ui.urls[10].url=/api-docs/administrador
springdoc.swagger-ui.urls-primary-name=clientes (login Mar\u00EDa)
# Conservar el token del boton Authorize al cambiar de definicion o recargar
# (sin esto habria que volver a pegar el JWT en cada cambio de servicio)
springdoc.swagger-ui.persist-authorization=true
