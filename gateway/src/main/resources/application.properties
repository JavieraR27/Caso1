spring.application.name=gateway
server.port=8080

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Eureka: el gateway resuelve cada servicio por nombre (lb://)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Rutas: una por microservicio, según el recurso de la URL.
# Local: lb://<servicio> vía Eureka. En Render: las *_SERVICE_URL apuntan a
# https://paris-<servicio>.onrender.com y Eureka va apagado (EUREKA_CLIENT_ENABLED=false).
spring.cloud.gateway.routes[0].id=legacy
spring.cloud.gateway.routes[0].uri=${LEGACY_SERVICE_URL:lb://legacy}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/legacy/**

spring.cloud.gateway.routes[1].id=clientes
spring.cloud.gateway.routes[1].uri=${CLIENTES_SERVICE_URL:lb://clientes}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/clientes/**

spring.cloud.gateway.routes[2].id=proveedores
spring.cloud.gateway.routes[2].uri=${PROVEEDORES_SERVICE_URL:lb://proveedores}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/proveedores/**

spring.cloud.gateway.routes[3].id=productos
spring.cloud.gateway.routes[3].uri=${PRODUCTOS_SERVICE_URL:lb://productos}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/productos/**,/api/v1/categorias/**

spring.cloud.gateway.routes[4].id=ventas
spring.cloud.gateway.routes[4].uri=${VENTAS_SERVICE_URL:lb://ventas}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/ventas/**

spring.cloud.gateway.routes[5].id=pagos
spring.cloud.gateway.routes[5].uri=${PAGOS_SERVICE_URL:lb://pagos}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/pagos/**

spring.cloud.gateway.routes[6].id=despacho
spring.cloud.gateway.routes[6].uri=${DESPACHO_SERVICE_URL:lb://despacho}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/envios/**

spring.cloud.gateway.routes[7].id=tickets
spring.cloud.gateway.routes[7].uri=${TICKETS_SERVICE_URL:lb://tickets}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/tickets/**

spring.cloud.gateway.routes[8].id=feedback
spring.cloud.gateway.routes[8].uri=${FEEDBACK_SERVICE_URL:lb://feedback}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/resenas/**

spring.cloud.gateway.routes[9].id=notificaciones
spring.cloud.gateway.routes[9].uri=${NOTIFICACIONES_SERVICE_URL:lb://notificaciones}
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/notificaciones/**

spring.cloud.gateway.routes[10].id=administrador
spring.cloud.gateway.routes[10].uri=${ADMINISTRADOR_SERVICE_URL:lb://administrador}
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/administradores/**,/api/v1/admin/**

# --- Swagger unificado (historia de María y resto del caso) ---
# Cada ruta expone el /v3/api-docs de un servicio bajo /api-docs/<servicio>;
# el desplegable de Swagger UI (springdoc.swagger-ui.urls) los agrupa en
# http://localhost:8080/swagger-ui.html
spring.cloud.gateway.routes[11].id=legacy-docs
spring.cloud.gateway.routes[11].uri=${LEGACY_SERVICE_URL:lb://legacy}
spring.cloud.gateway.routes[11].predicates[0]=Path=/api-docs/legacy
spring.cloud.gateway.routes[11].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[12].id=clientes-docs
spring.cloud.gateway.routes[12].uri=${CLIENTES_SERVICE_URL:lb://clientes}
