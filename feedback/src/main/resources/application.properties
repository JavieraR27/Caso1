spring.application.name=feedback
server.port=8089

# Perfil de secretos (patrón del profe; el archivo real está gitignored)
spring.profiles.include=secrets

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# ProblemDetail lo maneja nuestro GlobalExceptionHandler
spring.mvc.problemdetails.enabled=false

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Pool acotado (11 servicios contra un proyecto Neon)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# URLs de servicios consumidos (mapa PLAN.md, seccion 2)
ventas.service.url=http://localhost:8085
productos.service.url=http://localhost:8084
